<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seattle Rentals — 2–3BR Watch</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --cream:    #f5f0e8;
      --parchment:#ede7d9;
      --sand:     #d9cfc0;
      --bark:     #5c4a32;
      --bark-lt:  #7a6248;
      --rust:     #b85c38;
      --rust-lt:  #d4724f;
      --teal:     #3a7d6e;
      --teal-lt:  #52a896;
      --ink:      #1e1a14;
      --ink-mid:  #4a4035;
      --muted:    #8a7e70;
      --new-amber:#c98a2e;
      --new-bg:   #fdf3dc;
      --border:   #ccc3b0;
      --shadow:   0 2px 12px rgba(92,74,50,0.12);
      --font: "Georgia", "Times New Roman", serif;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; background: var(--cream); }

    /* ── Layout ── */
    #shell {
      display: grid;
      grid-template-rows: auto auto 1fr auto auto;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    #header {
      background: var(--bark);
      color: var(--cream);
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      z-index: 1000;
    }
    #header h1 {
      font-family: var(--font);
      font-size: 1.15rem;
      font-weight: normal;
      letter-spacing: 0.01em;
      color: var(--cream);
    }
    #header h1 em {
      font-style: normal;
      color: #e8c99a;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
    }
    .stat-pill {
      display: flex;
      align-items: baseline;
      gap: 0.35rem;
    }
    .stat-pill .n {
      font-family: var(--sans);
      font-size: 1.1rem;
      font-weight: 700;
      color: #e8c99a;
    }
    .stat-pill .lbl {
      font-family: var(--sans);
      font-size: 0.7rem;
      color: #c4b49a;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .stat-pill.active {
      background: rgba(201,138,46,0.18);
      border-radius: 6px;
      padding: 2px 7px;
      outline: 1px solid #c98a2e;
    }
    .stat-pill.active .n { color: #e8a030; }
    .stat-pill.active .lbl { color: #c98a2e; }
    #updated-text {
      font-family: var(--sans);
      font-size: 0.72rem;
      color: #c4b49a;
    }

    /* ── Filters bar ── */
    #filters {
      background: var(--parchment);
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
      z-index: 999;
    }
    .filter-label {
      font-family: var(--sans);
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-right: 0.15rem;
    }
    .chip {
      font-family: var(--sans);
      font-size: 0.72rem;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      border: 1px solid var(--sand);
      background: var(--cream);
      color: var(--ink-mid);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .chip:hover  { border-color: var(--bark-lt); color: var(--bark); }
    .chip.active { border-color: var(--rust); background: var(--rust); color: #fff; }

    .divider { width: 1px; height: 16px; background: var(--sand); margin: 0 0.25rem; }

    /* ── Map ── */
    #map {
      width: 100%;
      height: 100%;
      background: var(--cream);
      z-index: 1;
    }

    /* ── Bottom drawer ── */
    #drawer {
      background: var(--parchment);
      border-top: 1px solid var(--border);
      height: 200px;
      overflow-x: auto;
      overflow-y: hidden;
      display: flex;
      align-items: stretch;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      scroll-behavior: smooth;
    }
    #drawer::-webkit-scrollbar { height: 4px; }
    #drawer::-webkit-scrollbar-track { background: var(--sand); }
    #drawer::-webkit-scrollbar-thumb { background: var(--bark-lt); border-radius: 2px; }

    /* ── Cards ── */
    .card {
      flex-shrink: 0;
      width: 220px;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.12s;
    }
    .card:hover, .card.highlighted {
      border-color: var(--rust);
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }
    .card-hood {
      font-family: var(--sans);
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--rust);
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: space-between;
      align-items: center;
    }
    .card-hood .btn-seen { margin-left: auto; }
    .badge-new {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--new-amber);
      background: var(--new-bg);
      border: 1px solid var(--new-amber);
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
    }
    .card-address {
      font-family: var(--sans);
      font-size: 0.8rem;
      color: var(--ink);
      line-height: 1.3;
      font-weight: 500;
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: auto;
    }
    .card-beds {
      font-family: var(--sans);
      font-size: 0.7rem;
      color: var(--muted);
    }
    .card-rent {
      font-family: var(--sans);
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--teal);
    }
    .card-source {
      font-family: var(--sans);
      font-size: 0.62rem;
      color: var(--muted);
    }

    /* ── Seen / viewed ── */
    .card.seen {
      background: var(--parchment);
      border-color: var(--sand);
      opacity: 0.65;
    }
    .card.seen .card-rent { color: var(--muted); }
    .card.seen .card-hood { color: var(--muted); }

    .btn-seen {
      font-family: var(--sans);
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--muted);
      background: none;
      border: 1px solid var(--sand);
      border-radius: 3px;
      padding: 1px 5px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      line-height: 1.4;
    }
    .btn-seen:hover { border-color: var(--teal); color: var(--teal); }
    .card.seen .btn-seen { color: var(--teal); border-color: var(--teal); }
    .btn-seen-undo {
      font-family: var(--sans);
      font-size: 0.6rem;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
    }
    .btn-seen-undo:hover { color: var(--rust); }

    .badge-no-pets {
      display: inline-block;
      font-family: var(--sans);
      font-size: 0.58rem;
      font-weight: 700;
      color: #9b2f2f;
      background: #fce8e8;
      border: 1px solid #e09090;
      padding: 1px 5px;
      border-radius: 3px;
      white-space: nowrap;
    }

    /* ── Empty state ── */
    #empty-drawer {
      display: none;
      align-items: center;
      justify-content: center;
      width: 100%;
      font-family: var(--sans);
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ── List view ── */
    #list-view {
      display: none;
      flex-direction: column;
      overflow-y: auto;
      background: var(--cream);
      padding: 1rem 1.25rem;
      gap: 0;
    }
    #list-view.active {
      display: flex;
      grid-row: 3 / 6;
    }

    .list-date-group { margin-bottom: 1.25rem; }
    .list-date-heading {
      font-family: var(--sans);
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.3rem;
      margin-bottom: 0.6rem;
    }
    .list-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.65rem;
    }
    .list-card {
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.12s;
    }
    .list-card:hover {
      border-color: var(--rust);
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }
    .list-card.seen {
      background: var(--parchment);
      border-color: var(--sand);
      opacity: 0.65;
    }
    .list-card.seen .card-rent { color: var(--muted); }
    .list-card.seen .card-hood { color: var(--muted); }

    /* ── View toggle ── */
    .view-toggle {
      display: flex;
      border: 1px solid var(--sand);
      border-radius: 999px;
      overflow: hidden;
      background: var(--cream);
    }
    .view-toggle button {
      font-family: var(--sans);
      font-size: 0.72rem;
      padding: 0.25rem 0.75rem;
      border: none;
      background: none;
      color: var(--ink-mid);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .view-toggle button.active {
      background: var(--rust);
      color: #fff;
    }

    /* ── Leaflet popup overrides ── */
    .leaflet-popup-content-wrapper {
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      font-family: var(--sans);
    }
    .leaflet-popup-tip { background: var(--cream); }
    .leaflet-popup-content { margin: 10px 13px; min-width: 180px; }
    .popup-hood {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--rust);
      margin-bottom: 3px;
    }
    .popup-address {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.3;
      margin-bottom: 5px;
    }
    .popup-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 6px;
    }
    .popup-beds  { font-size: 0.72rem; color: var(--muted); }
    .popup-rent  { font-size: 0.9rem; font-weight: 700; color: var(--teal); }
    .popup-source { font-size: 0.62rem; color: var(--muted); margin-bottom: 6px; }
    .popup-link {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--rust);
      text-decoration: none;
      border: 1px solid var(--rust);
      border-radius: 4px;
      padding: 0.25rem 0.6rem;
      transition: background 0.15s, color 0.15s;
    }
    .popup-link:hover { background: var(--rust); color: #fff; }


    /* ── Legend ── */
    #legend {
      position: absolute;
      bottom: 216px;
      left: 12px;
      z-index: 1000;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.45rem 0.7rem;
      box-shadow: var(--shadow);
      font-family: var(--sans);
      font-size: 0.68rem;
      color: var(--ink-mid);
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .legend-row { display: flex; align-items: center; gap: 0.45rem; }
    .legend-dot { width: 11px; height: 11px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.18); flex-shrink: 0; }
  </style>
</head>
<body>

<div id="shell">

  <div id="header">
    <h1>Seattle Rentals &nbsp;<em>2–3 BR Watch</em></h1>
    <div class="header-right">
      <div class="stat-pill"><span class="n" id="stat-total">—</span><span class="lbl">listings</span></div>
      <div class="stat-pill" id="stat-new-pill" title="Click to filter new today" style="cursor:pointer"><span class="n" id="stat-new">—</span><span class="lbl">new today</span></div>
      <span id="updated-text">Loading…</span>
    </div>
  </div>

  <div id="filters">
    <span class="filter-label">Hood</span>
    <span class="chip active" data-filter="all">All</span>
    <span class="chip" data-filter="Ballard">Ballard</span>
    <span class="chip" data-filter="Queen Anne">Queen Anne</span>
    <span class="chip" data-filter="Fremont">Fremont</span>
    <span class="chip" data-filter="Phinney Ridge">Phinney Ridge</span>
    <span class="chip" data-filter="Wallingford">Wallingford</span>
    <span class="chip" data-filter="Green Lake">Green Lake</span>
    <span class="divider"></span>
    <span class="filter-label">Beds</span>
    <span class="chip active" data-beds="all">All</span>
    <span class="chip" data-beds="2">2 BR</span>
    <span class="chip" data-beds="3">3 BR</span>
    <span class="divider"></span>
    <span class="chip" id="chip-new" data-new="true">New today</span>
    <span class="divider"></span>
    <div class="view-toggle">
      <button id="btn-map" class="active">Map</button>
      <button id="btn-list">List</button>
    </div>
  </div>

  <div style="position:relative; overflow:hidden; min-height:0;">
    <div id="map" style="position:absolute; inset:0;"></div>
    <div id="legend">
      <div class="legend-row"><span class="legend-dot" style="background:#5b8fa8"></span>2 Bedroom</div>
      <div class="legend-row"><span class="legend-dot" style="background:#b85c38"></span>3 Bedroom</div>
      <div class="legend-row"><span class="legend-dot" style="background:#aaa89e;opacity:0.55"></span>Viewed</div>
    </div>
  </div>

  <div id="drawer">
    <div id="empty-drawer">No listings match the filter.</div>
  </div>

  <div id="list-view"></div>

</div>

<script>
  const NEW_HOURS   = 24;
  const DATA_URL    = 'listings.json';

  // Seattle center
  const map = L.map('map', { zoomControl: true }).setView([47.655, -122.350], 13);

  // CartoDB Voyager — warm, readable, no API key
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  // ── State ──────────────────────────────────────────────────────────────
  let allListings  = [];
  let activeHood   = 'all';
  let activeBeds   = 'all';
  let activeNew    = false;
  let markerLayer  = L.layerGroup().addTo(map);

  // ── Seen listings (localStorage cache + Neon backend) ───────────────────
  const SEEN_KEY = 'seattle-rentals-seen';
  const API = '/api/viewed';

  function loadSeen() {
    try { return new Set(JSON.parse(localStorage.getItem(SEEN_KEY) || '[]')); }
    catch { return new Set(); }
  }
  function saveSeen(set) {
    localStorage.setItem(SEEN_KEY, JSON.stringify([...set]));
  }
  let seenKeys = loadSeen();

  // Sync from server on load, merge with local cache
  fetch(API).then(r => r.json()).then(ids => {
    ids.forEach(id => seenKeys.add(id));
    saveSeen(seenKeys);
    render();
  }).catch(() => {});

  function seenId(l) { return l.address || l.url; }

  function markSeen(l) {
    const id = seenId(l);
    seenKeys.add(id);
    saveSeen(seenKeys);
    fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) }).catch(() => {});
  }
  function unmarkSeen(l) {
    const id = seenId(l);
    seenKeys.delete(id);
    saveSeen(seenKeys);
    fetch(API, { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) }).catch(() => {});
  }
  function isSeen(l) { return seenKeys.has(seenId(l)); }

  // ── Helpers ────────────────────────────────────────────────────────────

  function isNew(ts) {
    if (!ts) return false;
    const d = new Date(ts);
    const now = new Date();
    return d.getFullYear() === now.getFullYear() &&
           d.getMonth()    === now.getMonth() &&
           d.getDate()     === now.getDate();
  }

  function markerColor(beds) {
    return beds === 2 ? '#5b8fa8' : '#b85c38';
  }

  function makeIcon(beds, isNewListing, isSeen) {
    const color  = isSeen ? '#aaa89e' : markerColor(beds);
    const border = isSeen ? 'none' : (isNewListing ? '#c98a2e' : 'rgba(255,255,255,0.75)');
    const size   = isNewListing && !isSeen ? 16 : 13;
    const opacity = isSeen ? '0.55' : '1';
    return L.divIcon({
      className: '',
      html: `<div style="
        width:${size}px; height:${size}px; border-radius:50%;
        background:${color}; ${border !== 'none' ? `border:2.5px solid ${border};` : ''}
        box-shadow:0 1px 5px rgba(0,0,0,0.3);
        opacity:${opacity};
      "></div>`,
      iconSize: [size, size],
      iconAnchor: [size/2, size/2],
      popupAnchor: [0, -size/2 - 2],
    });
  }

  // ── Filter logic ───────────────────────────────────────────────────────

  function filtered() {
    return allListings.filter(l => {
      const hoodOk = activeHood === 'all' || l.neighborhood === activeHood;
      const bedsOk = activeBeds === 'all' || l.beds === parseInt(activeBeds);
      const newOk  = !activeNew || isNew(l.first_seen);
      return hoodOk && bedsOk && newOk && l.lat && l.lng;
    });
  }

  // ── Marker factory ─────────────────────────────────────────────────────

  function makeMarker(l, i) {
    const seen  = isSeen(l);
    const fresh = !seen && isNew(l.first_seen);
    const marker = L.marker([l.lat + (l._jitterLat || 0), l.lng + (l._jitterLng || 0)], { icon: makeIcon(l.beds, fresh, seen) });

    const badge = fresh ? '<span style="font-size:0.6rem;font-weight:700;color:#c98a2e;background:#fdf3dc;border:1px solid #c98a2e;padding:1px 5px;border-radius:3px;margin-left:6px;">NEW</span>' : '';
    const noPetsBadge = l.pets === 'none' ? '<span class="badge-no-pets" style="margin-left:6px;">No Pets</span>' : '';
    marker.bindPopup(`
      <div class="popup-hood">${l.neighborhood}${badge}${noPetsBadge}</div>
      <div class="popup-address">${l.address || '—'}</div>
      <div class="popup-row">
        <span class="popup-beds">${l.beds} Bedroom${l.beds!==1?'s':''}</span>
        <span class="popup-rent">${l.rent || ''}</span>
      </div>
      <div class="popup-source">${l.source}</div>
      <a class="popup-link" href="${l.url}" target="_blank" rel="noopener">View listing →</a>
    `, { maxWidth: 240 });

    marker.on('popupopen', () => {
      const link = marker.getPopup().getElement().querySelector('.popup-link');
      if (link) link.addEventListener('click', () => markSeenByIndex(i), { once: true });
    });
    marker.on('click', () => scrollToCard(i));
    return marker;
  }

  // ── Render ─────────────────────────────────────────────────────────────

  function render() {
    const listings = filtered();
    markerLayer.clearLayers();

    // Offset markers that share exact coordinates so stacked dots are visible
    const coordCount = {};
    listings.forEach(l => {
      const key = `${l.lat},${l.lng}`;
      coordCount[key] = (coordCount[key] || 0) + 1;
    });
    const coordIdx = {};
    listings.forEach(l => {
      const key = `${l.lat},${l.lng}`;
      const total = coordCount[key];
      if (total > 1) {
        const idx = coordIdx[key] = (coordIdx[key] || 0);
        coordIdx[key]++;
        const angle = (2 * Math.PI * idx) / total;
        const r = 0.00008;
        l._jitterLat = r * Math.cos(angle);
        l._jitterLng = r * Math.sin(angle) / Math.cos(l.lat * Math.PI / 180);
      } else {
        l._jitterLat = 0;
        l._jitterLng = 0;
      }
    });

    // Markers
    listings.forEach((l, i) => {
      markerLayer.addLayer(makeMarker(l, i));
    });

    // Drawer cards
    const drawer = document.getElementById('drawer');
    const empty  = document.getElementById('empty-drawer');

    if (!listings.length) {
      drawer.innerHTML = '';
      drawer.appendChild(empty);
      empty.style.display = 'flex';
      return;
    }
    empty.style.display = 'none';

    drawer.innerHTML = listings.map((l, i) => {
      const seen  = isSeen(l);
      const fresh = !seen && isNew(l.first_seen);
      return `<a class="card${seen ? ' seen' : ''}" id="card-${i}" href="${l.url}" target="_blank" rel="noopener"
                 onclick="highlightMarker(${i}); markSeenByIndex(${i})">
        <div class="card-hood">
          <span>${l.neighborhood}</span>
          ${fresh ? '<span class="badge-new">NEW</span>' : ''}
          ${l.pets === 'none' ? '<span class="badge-no-pets">No Pets</span>' : ''}
          <button class="btn-seen" onclick="toggleSeen(${i}, event)">${seen ? '✓ Viewed' : 'Mark viewed'}</button>
        </div>
        <div class="card-address">${l.address || '—'}</div>
        <div class="card-source">${l.source}</div>
        <div class="card-meta">
          <span class="card-beds">${l.beds} BR</span>
          <span class="card-rent">${l.rent || ''}</span>
        </div>
      </a>`;
    }).join('');

    // Fit map to markers
    if (listings.length) {
      const bounds = L.latLngBounds(listings.map(l => [l.lat, l.lng]));
      map.fitBounds(bounds, { padding: [40, 40], maxZoom: 15 });
    }

    if (activeView === 'list') renderListView();
  }

  function scrollToCard(i) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('highlighted'));
    const card = document.getElementById(`card-${i}`);
    if (card) {
      card.classList.add('highlighted');
      card.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }
  }

  window.highlightMarker = function(i) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('highlighted'));
    const card = document.getElementById(`card-${i}`);
    if (card) card.classList.add('highlighted');
  };

  function redrawMarkers(listings) {
    markerLayer.clearLayers();
    listings.forEach((l, j) => {
      markerLayer.addLayer(makeMarker(l, j));
    });
  }

  window.markSeenByIndex = function(i) {
    const listings = filtered();
    const l = listings[i];
    if (!l || isSeen(l)) return;
    markSeen(l);
    // Defer redraw so the popup link navigates before the marker is destroyed
    setTimeout(() => redrawMarkers(listings), 0);
    // Update card if visible
    const card = document.getElementById(`card-${i}`);
    if (card) {
      card.classList.add('seen');
      const btn = card.querySelector('.btn-seen');
      if (btn) btn.textContent = '✓ Viewed';
    }
  };

  window.toggleSeen = function(i, e) {
    e.preventDefault();
    e.stopPropagation();
    const listings = filtered();
    const l = listings[i];
    if (!l) return;
    if (isSeen(l)) {
      unmarkSeen(l);
    } else {
      markSeen(l);
    }
    // Update card in-place
    const card = document.getElementById(`card-${i}`);
    if (card) {
      const nowSeen = isSeen(l);
      card.classList.toggle('seen', nowSeen);
      const btn = card.querySelector('.btn-seen');
      if (btn) btn.textContent = nowSeen ? '✓ Viewed' : 'Mark viewed';
      const badge = card.querySelector('.badge-new');
      if (badge) badge.style.display = nowSeen ? 'none' : '';
    }
    redrawMarkers(listings);
  };

  // ── Stats ──────────────────────────────────────────────────────────────

  function updateStats(data) {
    const listings = data.listings || [];
    document.getElementById('stat-total').textContent = listings.length;
    document.getElementById('stat-new').textContent   = listings.filter(l => isNew(l.first_seen)).length;
    if (data.updated) {
      const mins = (Date.now() - new Date(data.updated).getTime()) / 60000;
      document.getElementById('updated-text').textContent =
        mins < 1 ? 'Updated just now' : `Updated ${Math.round(mins)}m ago`;
    } else {
      document.getElementById('updated-text').textContent = 'Never updated';
    }
  }

  // ── Fetch ──────────────────────────────────────────────────────────────

  async function refresh() {
    try {
      const r    = await fetch(DATA_URL + '?t=' + Date.now());
      const data = await r.json();
      allListings = data.listings || [];
      updateStats(data);
      render();
    } catch(e) { console.error('refresh failed', e); }
  }

  // ── Filter chips ───────────────────────────────────────────────────────

  document.querySelectorAll('[data-filter]').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('[data-filter]').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeHood = chip.dataset.filter;
      render();
    });
  });

  document.querySelectorAll('[data-beds]').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('[data-beds]').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeBeds = chip.dataset.beds;
      render();
    });
  });

  function toggleNew() {
    activeNew = !activeNew;
    document.getElementById('chip-new').classList.toggle('active', activeNew);
    document.getElementById('stat-new-pill').classList.toggle('active', activeNew);
    render();
  }

  document.getElementById('chip-new').addEventListener('click', toggleNew);
  document.getElementById('stat-new-pill').addEventListener('click', toggleNew);


  // ── View toggle ────────────────────────────────────────────────────────

  let activeView = 'map'; // 'map' | 'list'

  const mapWrap  = document.querySelector('#shell > div[style]');
  const drawer   = document.getElementById('drawer');
  const listView = document.getElementById('list-view');

  function setView(v) {
    activeView = v;
    document.getElementById('btn-map').classList.toggle('active', v === 'map');
    document.getElementById('btn-list').classList.toggle('active', v === 'list');
    mapWrap.style.display  = v === 'map' ? '' : 'none';
    drawer.style.display   = v === 'map' ? '' : 'none';
    listView.classList.toggle('active', v === 'list');
    if (v === 'list') renderListView();
  }

  document.getElementById('btn-map').addEventListener('click', () => setView('map'));
  document.getElementById('btn-list').addEventListener('click', () => { setView('list'); });

  function formatDate(ts) {
    if (!ts) return 'Unknown date';
    const d = new Date(ts);
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const day   = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const diff  = (today - day) / 86400000;
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Yesterday';
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
  }

  function renderListView() {
    const listings = filtered().slice().sort((a, b) => {
      const ta = a.first_seen ? new Date(a.first_seen).getTime() : 0;
      const tb = b.first_seen ? new Date(b.first_seen).getTime() : 0;
      return tb - ta;
    });

    if (!listings.length) {
      listView.innerHTML = '<div style="padding:2rem;font-family:var(--sans);font-size:0.85rem;color:var(--muted)">No listings match the filter.</div>';
      return;
    }

    // Group by date
    const groups = [];
    const groupMap = {};
    listings.forEach(l => {
      const key = formatDate(l.first_seen);
      if (!groupMap[key]) { groupMap[key] = []; groups.push(key); }
      groupMap[key].push(l);
    });

    listView.innerHTML = groups.map(dateLabel => {
      const items = groupMap[dateLabel];
      return `<div class="list-date-group">
        <div class="list-date-heading">${dateLabel}</div>
        <div class="list-grid">
          ${items.map((l, idx) => {
            const seen  = isSeen(l);
            const fresh = !seen && isNew(l.first_seen);
            const globalIdx = listings.indexOf(l);
            return `<a class="list-card${seen ? ' seen' : ''}" id="lcard-${globalIdx}" href="${l.url}" target="_blank" rel="noopener"
                       onclick="markSeenByListing(${globalIdx})">
              <div class="card-hood">
                <span>${l.neighborhood}</span>
                ${fresh ? '<span class="badge-new">NEW</span>' : ''}
                ${l.pets === 'none' ? '<span class="badge-no-pets">No Pets</span>' : ''}
                <button class="btn-seen" onclick="toggleSeenList(${globalIdx}, event)">${seen ? '✓ Viewed' : 'Mark viewed'}</button>
              </div>
              <div class="card-address">${l.address || '—'}</div>
              <div class="card-source">${l.source}</div>
              <div class="card-meta">
                <span class="card-beds">${l.beds} BR</span>
                <span class="card-rent">${l.rent || ''}</span>
              </div>
            </a>`;
          }).join('')}
        </div>
      </div>`;
    }).join('');
  }

  window.markSeenByListing = function(i) {
    const listings = filtered().slice().sort((a, b) => {
      return (b.first_seen ? new Date(b.first_seen).getTime() : 0) -
             (a.first_seen ? new Date(a.first_seen).getTime() : 0);
    });
    const l = listings[i];
    if (!l || isSeen(l)) return;
    markSeen(l);
    const card = document.getElementById(`lcard-${i}`);
    if (card) {
      card.classList.add('seen');
      const btn = card.querySelector('.btn-seen');
      if (btn) btn.textContent = '✓ Viewed';
    }
  };

  window.toggleSeenList = function(i, e) {
    e.preventDefault();
    e.stopPropagation();
    const listings = filtered().slice().sort((a, b) => {
      return (b.first_seen ? new Date(b.first_seen).getTime() : 0) -
             (a.first_seen ? new Date(a.first_seen).getTime() : 0);
    });
    const l = listings[i];
    if (!l) return;
    isSeen(l) ? unmarkSeen(l) : markSeen(l);
    const card = document.getElementById(`lcard-${i}`);
    if (card) {
      const nowSeen = isSeen(l);
      card.classList.toggle('seen', nowSeen);
      const btn = card.querySelector('.btn-seen');
      if (btn) btn.textContent = nowSeen ? '✓ Viewed' : 'Mark viewed';
    }
  };

  // ── Boot ───────────────────────────────────────────────────────────────
  refresh();
</script>

</body>
</html>
