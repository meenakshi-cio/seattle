name: Scrape listings

on:
  schedule:
    - cron: "45 16 * * *"        # 9:45am PT — early catch before 10am wave
    - cron: "*/10 17 * * *"     # every 10 min, 10–11am PT (peak)
    - cron: "45 21 * * *"       # 2:45pm PT — early catch before 3pm wave
    - cron: "*/10 22 * * *"     # every 10 min, 3–4pm PT (peak)
    - cron: "30,45 2 * * *"     # 7:30 & 7:45pm PT — evening bump
    - cron: "*/15 3 * * *"      # every 15 min, 8–9pm PT (evening bump)
    - cron: "0 */2 * * *"       # every 2 hours all other times
  workflow_dispatch:

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - run: playwright install --with-deps chromium

      - name: Run scraper
        env:
          CIO_APP_API_KEY: ${{ secrets.CIO_APP_API_KEY }}
          CIO_PIPELINES_API_KEY: ${{ secrets.CIO_PIPELINES_API_KEY }}
          CI: "true"
        run: python scraper.py

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/listings.json seen_listings.json
          git diff --cached --quiet || git commit -m "listings: routine refresh"
          git pull --rebase origin main
          git push
