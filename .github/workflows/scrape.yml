name: Scrape listings

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - run: playwright install --with-deps chromium

      - name: Run scraper
        env:
          CIO_APP_API_KEY: ${{ secrets.CIO_APP_API_KEY }}
          CIO_PIPELINES_API_KEY: ${{ secrets.CIO_PIPELINES_API_KEY }}
          CI: "true"
        run: python scraper.py

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/listings.json seen_listings.json
          git diff --cached --quiet || git commit -m "listings: routine refresh"
          git pull --rebase origin main
          git push
